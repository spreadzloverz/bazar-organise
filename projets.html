<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projets — BAZAR ORGANISÉ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FAFAFA;
      --fg: #111;
      --fg2: #555;
      --fg3: #AAA;
      --divider: #E5E3DF;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--fg); font-family: var(--sans); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 48px;
      background: var(--bg);
      border-bottom: 1px solid var(--divider);
    }
    .nav-logo { font-family: var(--serif); font-size: 17px; text-decoration: none; color: var(--fg); }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { font-size: 13px; color: var(--fg2); text-decoration: none; }
    .nav-links a:hover { color: var(--fg); }

    .page-header {
      padding: 120px 48px 48px;
      border-bottom: 1px solid var(--divider);
    }
    .page-title {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 72px);
      letter-spacing: -2px;
      line-height: 1;
    }
    .page-count {
      font-size: 13px;
      color: var(--fg3);
      margin-top: 12px;
    }

    /* FILTRES */
    .filters {
      display: flex;
      gap: 8px;
      padding: 24px 48px;
      border-bottom: 1px solid var(--divider);
      flex-wrap: wrap;
    }
    .filter-btn {
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 100px;
      border: 1px solid var(--divider);
      background: white;
      cursor: pointer;
      color: var(--fg2);
      font-family: var(--sans);
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--fg);
      color: white;
      border-color: var(--fg);
    }

    /* GRILLE */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--divider);
      padding: 1px;
    }
    @media (max-width: 900px) {
      .projects-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .projects-grid { grid-template-columns: 1fr; }
    }

    .proj-card {
      background: var(--bg);
      text-decoration: none;
      color: var(--fg);
      display: block;
      position: relative;
      overflow: hidden;
    }
    .proj-card.hero-card {
      grid-column: span 2;
      grid-row: span 1;
    }
    .proj-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #E0DDD7;
      transition: transform 0.4s ease;
    }
    .proj-card.hero-card .proj-img {
      aspect-ratio: 16/7;
    }
    .proj-card:hover .proj-img { transform: scale(1.03); }

    .proj-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #EEECEA 0%, #DDD9D3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg3);
      font-size: 24px;
    }
    .proj-card.hero-card .proj-img-placeholder { aspect-ratio: 16/7; }

    .proj-info {
      padding: 20px 24px 24px;
      border-top: 1px solid var(--divider);
    }
    .proj-acte {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--fg3);
      margin-bottom: 8px;
    }
    .proj-title {
      font-family: var(--serif);
      font-size: 20px;
      letter-spacing: -0.3px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .proj-card.hero-card .proj-title { font-size: 28px; }
    .proj-subtitle {
      font-size: 13px;
      color: var(--fg2);
      line-height: 1.5;
    }
    .proj-hero-badge {
      display: inline-block;
      background: var(--fg);
      color: white;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 3px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    footer {
      background: #111;
      color: #888;
      padding: 40px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-top: 1px;
    }
    footer .footer-brand { font-family: var(--serif); font-size: 16px; color: white; }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .page-header { padding: 96px 24px 32px; }
      .filters { padding: 16px 24px; }
      .proj-card.hero-card { grid-column: span 1; }
      footer { flex-direction: column; gap: 12px; text-align: center; padding: 32px 24px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Bazar Organisé</a>
  <div class="nav-links">
    <a href="projets.html">Projets</a>
    <a href="a-propos.html">À propos</a>
    <a href="a-propos.html#contact">Contact</a>
  </div>
</nav>

<div class="page-header">
  <h1 class="page-title">Tous les projets</h1>
  <p class="page-count" id="countLabel">15 projets</p>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn" data-filter="A1">L'Objet qui Pense</button>
  <button class="filter-btn" data-filter="A2">Le Signe qui Habite l'Espace</button>
  <button class="filter-btn" data-filter="A3">L'Identité comme Matière</button>
  <button class="filter-btn" data-filter="A4">La Transmission & l'Intime</button>
</div>

<div class="projects-grid" id="grid"></div>

<footer>
  <span class="footer-brand">Bazar Organisé</span>
  <span>Xavier Talbot — Concepteur-Réalisateur Pluridisciplinaire</span>
  <span>xaviertalbot@live.com</span>
</footer>

<script>
  let allProjects = [];
  let currentFilter = 'all';

  fetch('data/projects.json')
    .then(r => r.json())
    .then(data => {
      allProjects = data.projects;
      renderGrid(allProjects);
    });

  function renderGrid(projects) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    document.getElementById('countLabel').textContent = projects.length + ' projets';

    projects.forEach((p, i) => {
      const isHero = p.featured_hero === true;
      const card = document.createElement('a');
      card.className = 'proj-card' + (isHero ? ' hero-card' : '');
      card.href = `projet.html?id=${p.id}`;
      card.dataset.acte = p.acte;

      const imgSrc = (p.images && p.images.length > 0)
        ? `assets/images/${p.slug}/${p.images[0]}`
        : null;

      card.innerHTML = `
        ${imgSrc
          ? `<img class="proj-img" src="${imgSrc}" alt="${p.title}" loading="lazy">`
          : `<div class="proj-img-placeholder">📷</div>`
        }
        <div class="proj-info">
          ${isHero ? '<span class="proj-hero-badge">Projet Phare</span>' : ''}
          <div class="proj-acte">${p.acte_label || p.acte}</div>
          <div class="proj-title">${p.title}</div>
          ${p.subtitle ? `<div class="proj-subtitle">${p.subtitle}</div>` : ''}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // Filtres
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      const filtered = currentFilter === 'all'
        ? allProjects
        : allProjects.filter(p => p.acte === currentFilter);
      renderGrid(filtered);
    });
  });
</script>

</body>
</html>
